<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/bootstrap.min.css">
    <link rel="stylesheet" href="style/style.css">
    <title>Document</title>
</head>
<body>    
    <div class="container mt-4">
        <div class="card p-2 border border-2">
            <h2>user registration</h2>
            <div class="m-2">
                <label for="name" class="form-label">name:</label>
                <input type="text" id="name" class="form-control" placeholder="enter your name">
            </div>
            <div class="m-2">
                <label for="age" class="form-label">age:</label>
                <input type="number" id="age" class="form-control" placeholder="enter your age">
            </div>
            <div class="m-2">
                <label for="jop" class="form-label">jop:</label>
                <input type="text" id="jop" class="form-control" placeholder="enter your jop">
            </div>
            <button id="submit" class="btn btn-primary w-100 mt-2">Submit</button>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/indexx.js"></script>
</body>
</html>
